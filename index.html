<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Bill Splitter</title>
  </head>
  <body>
    <div>
      <h1>Bill Splitter</h1>
      <b>Want to do fair Bill Spitting?</b>
    </div>
    <div class="inputs">
      <label for="members">Enter the number of Members</label>
      <input type="number" id="members" />
      <label for="amount">Enter the amount you want to split</label>
      <input type="number" id="amount" />
      <label for="tip">Enter the Tip amount</label>
      <input type="number" id="tip" />
      <button id="btn">Proceed</button>
      <div><p id="result"></p></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
